<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — PixelPDF</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f;
    --bg-elevated:#111119;
    --surface:#15151f;
    --surface-hover:#1b1b28;
    --border:rgba(139,92,246,0.18);
    --border-strong:rgba(139,92,246,0.4);
    --text:#f3f2f8;
    --text-dim:#9997ab;
    --text-dimmer:#67657a;
    --purple:#8b5cf6;
    --pink:#ec4899;
    --red:#f87171;
    --green:#4ade80;
    --gradient: linear-gradient(135deg, var(--purple), var(--pink));
    --mono: 'JetBrains Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
    --body: 'Inter', sans-serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    background:
      radial-gradient(ellipse 700px 500px at 20% -10%, rgba(139,92,246,0.16), transparent),
      radial-gradient(ellipse 600px 500px at 90% 10%, rgba(236,72,153,0.10), transparent),
      var(--bg);
    color:var(--text);
    font-family:var(--body);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  .bg-grid{
    position:fixed; inset:0; z-index:-1;
    background-image:
      linear-gradient(rgba(139,92,246,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,92,246,0.05) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 900px 600px at 50% 0%, black 40%, transparent 75%);
  }

  a{ color:inherit; text-decoration:none; }

  .wrap{ max-width:1080px; margin:0 auto; padding:0 24px; width:100%; }

  nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:24px 0;
  }
  .logo{
    font-family:var(--display); font-weight:600; font-size:19px;
    display:flex; align-items:center; gap:8px;
  }
  .logo-mark{
    width:22px; height:22px;
    display:inline-block;
    object-fit:contain;
  }

  .center{
    flex:1;
    display:flex; align-items:center; justify-content:center;
    padding:32px 24px 64px;
    visibility:hidden;
  }
  body.ready .center{ visibility:visible; }

  .auth-card{
    width:100%; max-width:400px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:36px 32px;
  }
  .auth-card h1{
    font-family:var(--display); font-weight:600; font-size:22px;
    margin-bottom:6px;
  }
  .auth-card .sub{
    color:var(--text-dim); font-size:14px; margin-bottom:26px;
  }

  label{
    display:block; font-size:13px; color:var(--text-dim); margin-bottom:6px;
  }
  .field{ margin-bottom:16px; }
  input[type="email"], input[type="password"]{
    width:100%; background:var(--bg-elevated); border:1px solid var(--border);
    border-radius:9px; padding:11px 13px; color:var(--text); font-size:14.5px;
    font-family:var(--body);
    transition:border-color .15s;
  }
  input[type="email"]:focus, input[type="password"]:focus{
    outline:none; border-color:var(--border-strong);
  }

  .btn-primary{
    width:100%; padding:12px 22px; border-radius:9px; font-size:14.5px; font-weight:600;
    background:var(--gradient); color:#fff; border:none; cursor:pointer;
    box-shadow:0 0 0 1px rgba(255,255,255,0.06) inset, 0 8px 24px -8px rgba(139,92,246,0.55);
    transition:transform .15s, opacity .15s;
    margin-top:6px;
  }
  .btn-primary:hover{ transform:translateY(-1px); }
  .btn-primary:disabled{ opacity:.6; cursor:default; transform:none; }

  .btn-google{
    width:100%; padding:11px 22px; border-radius:9px; font-size:14.5px; font-weight:500;
    background:var(--bg-elevated); border:1px solid var(--border); color:var(--text);
    display:flex; align-items:center; justify-content:center; gap:10px;
    cursor:pointer; transition:border-color .15s, background .15s;
    font-family:var(--body);
  }
  .btn-google:hover{ border-color:var(--border-strong); background:var(--surface-hover); }

  .divider{
    display:flex; align-items:center; gap:12px; margin:20px 0;
    font-size:12.5px; color:var(--text-dimmer);
  }
  .divider::before, .divider::after{
    content:''; flex:1; height:1px; background:var(--border);
  }

  .switch-mode{
    text-align:center; margin-top:20px; font-size:13.5px; color:var(--text-dim);
  }
  .switch-mode button{
    background:none; border:none; color:var(--purple); font-size:13.5px;
    font-family:var(--body); font-weight:600; cursor:pointer; padding:0;
  }
  .switch-mode button:hover{ color:var(--pink); }

  .message{
    font-size:13.5px; border-radius:9px; padding:10px 13px; margin-bottom:16px;
    display:none;
  }
  .message.error{
    display:block; background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); color:var(--red);
  }
  .message.success{
    display:block; background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.3); color:var(--green);
  }

  footer{
    text-align:center; padding:24px; color:var(--text-dimmer); font-size:13px;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="wrap">
  <nav>
    <a href="index.html" class="logo"><img src="logo.png" alt="" class="logo-mark">PixelPDF</a>
  </nav>
</div>

<div class="center">
  <div class="auth-card">
    <h1 id="form-title">Welcome back</h1>
    <p class="sub" id="form-sub">Log in to see your dashboard.</p>

    <div class="message" id="message"></div>

    <button type="button" id="google-btn" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.09-1.8 2.73v2.27h2.91c1.7-1.57 2.69-3.88 2.69-6.64z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.27c-.81.54-1.85.86-3.05.86-2.34 0-4.33-1.58-5.04-3.71H.96v2.34C2.44 15.98 5.48 18 9 18z"/>
        <path fill="#FBBC05" d="M3.96 10.7c-.18-.54-.28-1.11-.28-1.7s.1-1.16.28-1.7V4.96H.96A8.996 8.996 0 000 9c0 1.45.35 2.83.96 4.04l3-2.34z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l3 2.34C4.67 5.16 6.66 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or continue with email</div>

    <form id="auth-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" minlength="6">
      </div>
      <button type="submit" class="btn-primary" id="submit-btn">Log in</button>
    </form>

    <div class="switch-mode">
      <span id="switch-text">Don't have an account?</span>
      <button type="button" id="switch-btn">Sign up</button>
    </div>
  </div>
</div>

<footer>© 2026 PixelPDF · <a href="impressum.html" style="color:inherit;">Imprint</a> · <a href="datenschutz.html" style="color:inherit;">Privacy Policy</a></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
  let mode = "login"; // "login" | "signup"

  const form = document.getElementById("auth-form");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const submitBtn = document.getElementById("submit-btn");
  const messageBox = document.getElementById("message");
  const title = document.getElementById("form-title");
  const sub = document.getElementById("form-sub");
  const switchText = document.getElementById("switch-text");
  const switchBtn = document.getElementById("switch-btn");

  function showMessage(text, type){
    messageBox.textContent = text;
    messageBox.className = "message " + type;
  }
  function clearMessage(){
    messageBox.className = "message";
    messageBox.textContent = "";
  }

  function friendlyAuthError(error){
    const msg = (error && error.message) || "";
    if (/password/i.test(msg) && /(at least|6 characters|weak|character|lowercase|uppercase|digit|symbol)/i.test(msg)) {
      return "Please choose a password with at least 6 characters.";
    }
    if (/already registered|already exists/i.test(msg)) {
      return "An account with this email already exists — try logging in instead.";
    }
    if (/invalid login credentials/i.test(msg)) {
      return "Incorrect email or password.";
    }
    if (/unable to validate email|invalid email/i.test(msg)) {
      return "Please enter a valid email address.";
    }
    if (/email not confirmed/i.test(msg)) {
      return "Please confirm your email address first — check your inbox.";
    }
    return "Something went wrong. Please try again.";
  }

  document.getElementById("google-btn").addEventListener("click", async () => {
    await sb.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: window.location.origin + "/dashboard.html" },
    });
  });

  switchBtn.addEventListener("click", () => {
    mode = mode === "login" ? "signup" : "login";
    clearMessage();
    if (mode === "signup") {
      title.textContent = "Create your account";
      sub.textContent = "200 free credits, no credit card required.";
      submitBtn.textContent = "Sign up";
      switchText.textContent = "Already have an account?";
      switchBtn.textContent = "Log in";
    } else {
      title.textContent = "Welcome back";
      sub.textContent = "Log in to see your dashboard.";
      submitBtn.textContent = "Log in";
      switchText.textContent = "Don't have an account?";
      switchBtn.textContent = "Sign up";
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearMessage();
    submitBtn.disabled = true;

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    try {
      if (mode === "signup") {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) throw error;

        if (data.session) {
          window.location.href = "dashboard.html";
        } else {
          showMessage("Almost there — please confirm your email address using the link we just sent you.", "success");
        }
      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = "dashboard.html";
      }
    } catch (err) {
      showMessage(friendlyAuthError(err), "error");
    } finally {
      submitBtn.disabled = false;
    }
  });

  // Already logged in? Skip straight to the dashboard instead of flashing this form.
  sb.auth.getSession().then(({ data }) => {
    if (data.session) {
      window.location.href = "dashboard.html";
    } else {
      document.body.classList.add("ready");
    }
  });
</script>
</body>
</html>
